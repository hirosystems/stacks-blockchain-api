name: Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.3.0 or 1.3.0-beta.0)'
        required: true
        type: string

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: v${{ inputs.version }}

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'

      - name: Install deps
        run: npm ci --audit=false

      - name: Install client deps
        run: npm ci --audit=false
        working-directory: client

      - name: Publish client to npm
        working-directory: client
        run: |
          VERSION="${{ inputs.version }}"
          if [[ "$VERSION" == *-* ]]; then
            # Extract the prerelease identifier (e.g. "next" from "9.0.0-next.30")
            TAG="${VERSION#*-}"
            TAG="${TAG%%.*}"
            npm publish --provenance --access public --tag "$TAG"
          else
            npm publish --provenance --access public
          fi

  publish-docker:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: v${{ inputs.version }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@v6
        with:
          # TODO: Add ghcr after migrating to stx-labs
          images: |
            hirosystems/${{ github.event.repository.name }}
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.version }}
            type=semver,pattern={{major}},value=${{ inputs.version }}
            type=raw,value=latest,enable=${{ !contains(inputs.version, '-') }}

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build/Tag/Push Image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          push: true

